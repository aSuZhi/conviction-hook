[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [
  { access = "read", path = "./" },
  { access = "read-write", path = "./deployments" }
]

[rpc_endpoints]
xlayer = "${XLAYER_MAINNET_RPC_URL}"
xlayer_testnet = "${XLAYER_TESTNET_RPC_URL}"

[etherscan]
xlayer = { key = "${XLAYER_MAINNET_EXPLORER_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/XLAYER", chain = 196, verifier = "oklink" }
